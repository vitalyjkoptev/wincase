# =====================================================
# FILE: pubspec.yaml
# WINCASE CRM Mobile App — Flutter 3.29+
# =====================================================

name: wincase_crm
description: WINCASE CRM Mobile App for Immigration Bureau
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.0

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Local Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Biometric Auth
  local_auth: ^2.3.0

  # Push Notifications (Firebase)
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1

  # WebSocket (Laravel Reverb)
  web_socket_channel: ^3.0.2
  laravel_echo_null: ^0.0.1

  # UI Components
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  pull_to_refresh_flutter3: ^2.0.2

  # Media / File Picker
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.3
  retrofit_generator: ^9.1.6
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_w_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_w_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ---------------------------------------------------------------
# Аннотация (RU):
# pubspec.yaml — зависимости Flutter приложения WINCASE CRM.
# Riverpod (state), GoRouter (навигация), Dio+Retrofit (API),
# Firebase (push), fl_chart (графики), WebSocket (Reverb).
# Файл: pubspec.yaml
# ---------------------------------------------------------------
