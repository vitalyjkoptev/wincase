<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#B22222"/>
    </linearGradient>
  </defs>

  <!-- Red accent bar -->
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#accentGrad)"/>

  <!-- WARSAW text -->
  <text x="20" y="38" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#1a1a1a" letter-spacing="3">WARSAW</text>

  <!-- DAILY text -->
  <text x="222" y="38" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="400" fill="#DC143C" letter-spacing="3">DAILY</text>

  <!-- Tagline -->
  <text x="20" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" letter-spacing="4" text-transform="uppercase">YOUR CITY. YOUR NEWS. YOUR VOICE.</text>

  <!-- Subtle divider line -->
  <line x1="20" y1="68" x2="380" y2="68" stroke="#e0e0e0" stroke-width="0.5"/>
</svg>
