# =====================================================
# FILE: docker-compose.yml
# WINCASE CRM v4.0 — Full Stack Production
# =====================================================

services:

  # =====================================================
  # PHP-FPM (Laravel 12)
  # =====================================================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-app
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wincase-net

  # =====================================================
  # Nginx (Reverse Proxy + SSL)
  # =====================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: wincase-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - wincase-net

  # =====================================================
  # MySQL 8.4 LTS
  # =====================================================
  mysql:
    image: mysql:8.4
    container_name: wincase-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wincase-net

  # =====================================================
  # Redis 7 (Cache + Queue + Sessions + Reverb)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: wincase-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wincase-net

  # =====================================================
  # Laravel Queue Worker
  # =====================================================
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - wincase-net

  # =====================================================
  # Laravel Scheduler (Cron)
  # =====================================================
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - wincase-net

  # =====================================================
  # Laravel Reverb (WebSocket)
  # =====================================================
  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - wincase-net

  # =====================================================
  # n8n (Workflow Automation)
  # =====================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: wincase-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST:-n8n.wincase.pro}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST:-n8n.wincase.pro}/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_HOST=mysql
      - DB_MYSQLDB_DATABASE=wincase_n8n
      - DB_MYSQLDB_USER=${DB_USERNAME}
      - DB_MYSQLDB_PASSWORD=${DB_PASSWORD}
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wincase-net

volumes:
  mysql-data:
  redis-data:
  n8n-data:

networks:
  wincase-net:
    driver: bridge

# ---------------------------------------------------------------
# Аннотация (RU):
# Docker Compose — 7 сервисов:
# app (PHP-FPM + Laravel 12), nginx (reverse proxy + SSL),
# mysql (8.4 LTS), redis (7, cache+queue+sessions),
# queue (Laravel queue worker), scheduler (cron every 60s),
# reverb (WebSocket :8080), n8n (workflows :5678).
# 3 volumes: mysql-data, redis-data, n8n-data.
# Файл: docker-compose.yml
# ---------------------------------------------------------------
