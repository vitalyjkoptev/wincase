<svg xmlns="http://www.w3.org/2000/svg" width="744" height="256" viewBox="0 0 744 256">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background transparent -->

  <!-- Top decorative line -->
  <line x1="20" y1="30" x2="724" y2="30" stroke="#000000" stroke-width="2"/>
  <line x1="20" y1="34" x2="724" y2="34" stroke="#000000" stroke-width="0.5"/>

  <!-- Main title: PolandPulse -->
  <text x="372" y="145"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-size="96"
        font-weight="900"
        fill="#000000"
        text-anchor="middle"
        letter-spacing="2">PolandPulse</text>

  <!-- Subtitle -->
  <text x="372" y="190"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-size="22"
        font-weight="700"
        fill="#333333"
        text-anchor="middle"
        letter-spacing="6">POLAND NEWS &amp; IMMIGRATION PORTAL</text>

  <!-- Bottom decorative line -->
  <line x1="20" y1="212" x2="724" y2="212" stroke="#000000" stroke-width="0.5"/>
  <line x1="20" y1="216" x2="724" y2="216" stroke="#000000" stroke-width="2"/>

  <!-- Small decorative dots -->
  <circle cx="372" cy="232" r="2" fill="#000000"/>
</svg>
