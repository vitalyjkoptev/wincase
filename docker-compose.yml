# WINCASE CRM v4.0 — Local Development
# Usage: docker compose up -d

services:

  # PHP-FPM (Laravel 12)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wincase-net

  # Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: wincase-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - wincase-net

  # MySQL 8.4
  mysql:
    image: mysql:8.4
    container_name: wincase-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_DATABASE:-wincase_crm}
      MYSQL_USER: ${DB_USERNAME:-wincase}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wincase-net

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: wincase-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wincase-net

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - wincase-net

  # Scheduler (Cron)
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - wincase-net

  # Reverb (WebSocket)
  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wincase-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - wincase-net

volumes:
  mysql-data:
  redis-data:

networks:
  wincase-net:
    driver: bridge
